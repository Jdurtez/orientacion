<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador Go4orienteering v3</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #e67e22;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1, h2 { text-align: center; color: var(--primary); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            text-transform: uppercase;
        }
        .codes-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }
        .time-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        button {
            padding: 15px;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 10px;
        }
        .btn-submit { background-color: var(--secondary); width: 100%; }
        .btn-export { background-color: var(--primary); width: 48%; }
        .btn-clear { background-color: #95a5a6; width: 48%; }
        .buttons-row { display: flex; justify-content: space-between; margin-top: 20px; }
        
        #feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        .correct { background-color: #d5f5e3; color: var(--success); border: 1px solid var(--success); }
        .incorrect { background-color: #fadbd8; color: var(--error); border: 1px solid var(--error); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: var(--primary); color: white; }
        .ranking-container { margin-top: 40px; overflow-x: auto; }
    </style>
</head>
<body>

<div class="container">
    <h1>🧭 Validador Go4orienteering</h1>
    
    <form id="orienteeringForm">
        <div class="time-grid">
            <div class="form-group">
                <label>Nombre del alumno</label>
                <input type="text" id="nombre" required>
            </div>
            <div class="form-group">
                <label>Curso / Grupo</label>
                <input type="text" id="curso" required>
            </div>
        </div>

        <div class="form-group">
            <label>Código del recorrido (Ej: 4.01)</label>
            <input type="text" id="recorrido" required placeholder="X.XX">
        </div>

        <label>Los 7 números encontrados</label>
        <div class="codes-grid form-group">
            <input type="number" id="c1" required>
            <input type="number" id="c2" required>
            <input type="number" id="c3" required>
            <input type="number" id="c4" required>
            <input type="number" id="c5" required>
            <input type="number" id="c6" required>
            <input type="number" id="c7" required>
        </div>

        <div class="time-grid">
            <div class="form-group">
                <label>Letra de salida</label>
                <input type="text" id="letra" required maxlength="1">
            </div>
            <div class="form-group">
                <label>Tiempos (Salida - Llegada) mm:ss</label>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="tSalida" required pattern="[0-9]{1,2}:[0-9]{2}" placeholder="00:00">
                    <input type="text" id="tLlegada" required pattern="[0-9]{1,2}:[0-9]{2}" placeholder="05:30">
                </div>
            </div>
        </div>

        <button type="submit" class="btn-submit">Comprobar y Registrar</button>
    </form>

    <div id="feedback"></div>

    <div class="ranking-container">
        <h2>🏆 Resultados y Ranking</h2>
        <table id="rankingTable">
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Alumno</th>
                    <th>Grupo</th>
                    <th>Rec</th>
                    <th>Nivel</th>
                    <th>Tiempo</th>
                    <th>Fallos</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        
        <div class="buttons-row">
            <button class="btn-export" onclick="exportarCSV()">📥 Descargar Excel (CSV)</button>
            <button class="btn-clear" onclick="limpiarDatos()">🗑️ Borrar Todo</button>
        </div>
    </div>
</div>

        "4.78": ["27", "52", "53", "48", "26", "46", "38", "N"]
    };

    let resultados = JSON.parse(localStorage.getItem('resultadosOrienteeringV3')) || [];
    let contadorFallos = 0;

    actualizarTabla();

    function calcularSegundos(tiempoStr) {
        let partes = tiempoStr.split(':');
        return parseInt(partes[0]) * 60 + parseInt(partes[1]);
    }

    function formatearTiempo(segundosTotales) {
        let m = Math.floor(segundosTotales / 60);
        let s = segundosTotales % 60;
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    document.getElementById('orienteeringForm').addEventListener('submit', function(e) {
        e.preventDefault();
        let recorrido = document.getElementById('recorrido').value.trim();
        let feedback = document.getElementById('feedback');

        if (!soluciones[recorrido]) {
            feedback.innerHTML = `❌ El recorrido ${recorrido} no existe.`;
            feedback.className = 'incorrect';
            feedback.style.display = 'block';
            return;
        }

        let introducidos = [];
        for (let i = 1; i <= 7; i++) {
            introducidos.push(document.getElementById('c' + i).value.trim());
        }
        introducidos.push(document.getElementById('letra').value.trim().toUpperCase());

        let sol = soluciones[recorrido];
        let esCorrecto = introducidos.every((val, index) => val === sol[index]);

        if (esCorrecto) {
            let tSalidaSeg = calcularSegundos(document.getElementById('tSalida').value);
            let tLlegadaSeg = calcularSegundos(document.getElementById('tLlegada').value);
            if (tLlegadaSeg < tSalidaSeg) tLlegadaSeg += 3600;
            let tiempoNeto = tLlegadaSeg - tSalidaSeg;

            let dificultad = parseInt(recorrido.split('.')[1].charAt(0));

            resultados.push({
                nombre: document.getElementById('nombre').value.toUpperCase(),
                curso: document.getElementById('curso').value.toUpperCase(),
                recorrido: recorrido,
                dificultad: dificultad,
                tiempoSeg: tiempoNeto,
                tiempoStr: formatearTiempo(tiempoNeto),
                fallos: contadorFallos
            });

            localStorage.setItem('resultadosOrienteeringV3', JSON.stringify(resultados));
            actualizarTabla();
            
            feedback.innerHTML = `✅ ¡CORRECTO! Tiempo: ${formatearTiempo(tiempoNeto)}. Fallos cometidos: ${contadorFallos}`;
            feedback.className = 'correct';
            feedback.style.display = 'block';
            
            this.reset();
            contadorFallos = 0; // Resetear fallos para el siguiente
        } else {
            contadorFallos++;
            feedback.innerHTML = `❌ Error en los códigos. Inténtalo de nuevo. (Errores acumulados: ${contadorFallos})`;
            feedback.className = 'incorrect';
            feedback.style.display = 'block';
        }
    });

    function actualizarTabla() {
        // Ordenar: dificultad (desc) y luego tiempo (asc)
        resultados.sort((a, b) => b.dificultad - a.dificultad || a.tiempoSeg - b.tiempoSeg);
        let tbody = document.querySelector('#rankingTable tbody');
        tbody.innerHTML = '';
        resultados.forEach((res, i) => {
            tbody.innerHTML += `<tr>
                <td>${i+1}</td>
                <td>${res.nombre}</td>
                <td>${res.curso}</td>
                <td>${res.recorrido}</td>
                <td>Nivel ${res.dificultad}</td>
                <td>${res.tiempoStr}</td>
                <td>${res.fallos}</td>
            </tr>`;
        });
    }

    function exportarCSV() {
        if (resultados.length === 0) return alert("No hay datos para exportar");
        
        let csvContent = "data:text/csv;charset=utf-8,";
        csvContent += "Posicion;Nombre;Grupo;Recorrido;Dificultad;Tiempo;Fallos\n";
        
        resultados.forEach((r, i) => {
            csvContent += `${i+1};${r.nombre};${r.curso};${r.recorrido};${r.dificultad};${r.tiempoStr};${r.fallos}\n`;
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "resultados_orientacion.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function limpiarDatos() {
        if (confirm("¿Borrar todos los resultados acumulados?")) {
            localStorage.removeItem('resultadosOrienteeringV3');
            resultados = [];
            actualizarTabla();
        }
    }
</script>
</body>
</html>
