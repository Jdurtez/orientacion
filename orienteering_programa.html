<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador Go4orienteering</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #e67e22;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1, h2 {
            text-align: center;
            color: var(--primary);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .codes-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .time-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #d35400;
        }
        #feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        .correct { background-color: #d5f5e3; color: var(--success); border: 1px solid var(--success); }
        .incorrect { background-color: #fadbd8; color: var(--error); border: 1px solid var(--error); }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th { background-color: var(--primary); color: white; }
        .ranking-container { margin-top: 40px; }
        .clear-btn { background-color: #95a5a6; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🧭 Validador Go4orienteering</h1>
    
    <form id="orienteeringForm">
        <div class="time-grid">
            <div class="form-group">
                <label for="nombre">Nombre del alumno</label>
                <input type="text" id="nombre" required placeholder="Ej. Ana García">
            </div>
            <div class="form-group">
                <label for="curso">Curso / Grupo</label>
                <input type="text" id="curso" required placeholder="Ej. 3º ESO A">
            </div>
        </div>

        <div class="form-group">
            <label for="recorrido">Código del recorrido (Ej. 4.01)</label>
            <input type="text" id="recorrido" required placeholder="4.xx">
        </div>

        <label>Los 7 códigos encontrados</label>
        <div class="codes-grid form-group">
            <input type="number" id="c1" required placeholder="Cód 1">
            <input type="number" id="c2" required placeholder="Cód 2">
            <input type="number" id="c3" required placeholder="Cód 3">
            <input type="number" id="c4" required placeholder="Cód 4">
            <input type="number" id="c5" required placeholder="Cód 5">
            <input type="number" id="c6" required placeholder="Cód 6">
            <input type="number" id="c7" required placeholder="Cód 7">
        </div>

        <div class="form-group">
            <label for="letra">Letra de salida</label>
            <input type="text" id="letra" required maxlength="1" placeholder="Letra">
        </div>

        <div class="time-grid">
            <div class="form-group">
                <label for="tSalida">Tiempo de Salida (mm:ss)</label>
                <input type="text" id="tSalida" required pattern="[0-9]{1,2}:[0-9]{2}" placeholder="00:00">
            </div>
            <div class="form-group">
                <label for="tLlegada">Tiempo de Llegada (mm:ss)</label>
                <input type="text" id="tLlegada" required pattern="[0-9]{1,2}:[0-9]{2}" placeholder="15:30">
            </div>
        </div>

        <button type="submit">Comprobar y Registrar</button>
    </form>

    <div id="feedback"></div>

    <div class="ranking-container">
        <h2>🏆 Ranking de Alumnos</h2>
        <table id="rankingTable">
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Alumno</th>
                    <th>Grupo</th>
                    <th>Recorrido</th>
                    <th>Dificultad</th>
                    <th>Tiempo Neto</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
        <button class="clear-btn" onclick="limpiarDatos()">Borrar todos los datos (Final de clase)</button>
    </div>
</div>

    let resultados = JSON.parse(localStorage.getItem('resultadosOrienteering')) || [];
    actualizarTabla();

    function calcularSegundos(tiempoStr) {
        let partes = tiempoStr.split(':');
        return parseInt(partes[0]) * 60 + parseInt(partes[1]);
    }

    function formatearTiempo(segundosTotales) {
        let m = Math.floor(segundosTotales / 60);
        let s = segundosTotales % 60;
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    document.getElementById('orienteeringForm').addEventListener('submit', function(e) {
        e.preventDefault();

        let recorrido = document.getElementById('recorrido').value.trim();
        let feedback = document.getElementById('feedback');

        if (!soluciones[recorrido]) {
            feedback.textContent = `❌ El recorrido ${recorrido} no existe en la base de datos.`;
            feedback.className = 'incorrect';
            feedback.style.display = 'block';
            return;
        }

        // Obtener los 7 códigos insertados
        let introducidos = [];
        for (let i = 1; i <= 7; i++) {
            introducidos.push(document.getElementById('c' + i).value.trim());
        }
        
        // Añadir la letra de salida como el elemento número 8
        let letraIntroducida = document.getElementById('letra').value.trim().toUpperCase();
        introducidos.push(letraIntroducida);

        // Validar: Comparamos los 8 elementos (7 números + 1 letra)
        let correcto = true;
        let sol = soluciones[recorrido];
        for (let i = 0; i < 8; i++) {
            if (introducidos[i] !== sol[i]) {
                correcto = false;
                break;
            }
        }

        if (correcto) {
            // Calcular tiempo neto
            let tSalidaSeg = calcularSegundos(document.getElementById('tSalida').value);
            let tLlegadaSeg = calcularSegundos(document.getElementById('tLlegada').value);
            
            // Si el tiempo de llegada es menor (cambio de hora), sumar 60 min (3600 seg)
            if (tLlegadaSeg < tSalidaSeg) { tLlegadaSeg += 3600; }
            
            let tiempoNetoSeg = tLlegadaSeg - tSalidaSeg;
            
            // Dificultad (primer dígito después del punto)
            let dificultad = parseInt(recorrido.split('.')[1].charAt(0));

            let registro = {
                nombre: document.getElementById('nombre').value,
                curso: document.getElementById('curso').value,
                recorrido: recorrido,
                dificultad: dificultad,
                tiempoSeg: tiempoNetoSeg,
                tiempoStr: formatearTiempo(tiempoNetoSeg)
            };

            resultados.push(registro);
            localStorage.setItem('resultadosOrienteering', JSON.stringify(resultados));
            
            feedback.innerHTML = `✅ ¡Correcto! Tiempo neto: <strong>${registro.tiempoStr}</strong>`;
            feedback.className = 'correct';
            feedback.style.display = 'block';
            
            actualizarTabla();
            this.reset(); // Limpiar formulario para el siguiente alumno
        } else {
            feedback.textContent = '❌ Hay algún error en los códigos o en la letra. ¡Revisa tu tarjeta de control!';
            feedback.className = 'incorrect';
            feedback.style.display = 'block';
        }
    });

    function actualizarTabla() {
        // Ordenar: Mayor dificultad primero, luego menor tiempo
        resultados.sort((a, b) => {
            if (b.dificultad !== a.dificultad) {
                return b.dificultad - a.dificultad; 
            }
            return a.tiempoSeg - b.tiempoSeg;
        });

        let tbody = document.querySelector('#rankingTable tbody');
        tbody.innerHTML = '';

        resultados.forEach((res, index) => {
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${index + 1}</strong></td>
                <td>${res.nombre}</td>
                <td>${res.curso}</td>
                <td>${res.recorrido}</td>
                <td>Nivel ${res.dificultad}</td>
                <td><strong>${res.tiempoStr}</strong></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function limpiarDatos() {
        if (confirm("¿Estás seguro de que quieres borrar todos los registros? Haz esto solo al final de la clase o día.")) {
            localStorage.removeItem('resultadosOrienteering');
            resultados = [];
            actualizarTabla();
            document.getElementById('feedback').style.display = 'none';
        }
    }
</script>

</html>
